<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Nouvelle Vente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f6f9;color:#333}
.navbar{background:#1e3a8a;color:white;padding:18px 50px;display:flex;justify-content:space-between;align-items:center}
.navbar h2{font-size:24px}
.menu a{color:white;text-decoration:none;margin-left:20px;font-weight:bold}
.container{max-width:1100px;margin:35px auto}
.card{background:white;padding:28px;border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.08);margin-bottom:25px}
h1,h2{color:#1e3a8a;margin-bottom:20px}
.info{background:#dbeafe;color:#1e3a8a;padding:14px 20px;border-radius:12px;margin-bottom:25px;font-weight:bold}
.row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:18px;align-items:end}
label{font-weight:bold;display:block;margin-bottom:8px}
select,input{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:10px}
button{padding:13px 20px;border:none;border-radius:10px;color:white;font-weight:bold;cursor:pointer}
.btn-green{background:#16a34a}
.btn-red{background:#dc2626}
table{width:100%;border-collapse:collapse;margin-top:15px}
th{background:#e5e7eb;padding:14px;text-align:left;color:#374151}
td{padding:14px;border-bottom:1px solid #e5e7eb}
.total{text-align:right;font-size:24px;font-weight:bold;margin-top:20px;color:#1e3a8a}
.action{text-align:right;margin-top:20px}
.badge{background:#16a34a;color:white;padding:7px 12px;border-radius:20px}
</style>
</head>
<body>

<div class="navbar">
    <h2>🛒 Caisse Supermarché</h2>
    <div class="menu">
        <a href="achat.html">Nouvelle vente</a>
        <a href="produits.html">Produits</a>
        <a href="historique.html">Historique</a>
    </div>
</div>

<div class="container">

    <div class="info">
        Caisse actuelle : <span class="badge">Caisse 1</span>
    </div>

    <div class="card">
        <h1>Nouvelle vente</h1>

        <form>
            <div class="row">
                <div>
                    <label>Produit</label>
                    <select>
                        <option>Biscuit - 1000 Ar</option>
                        <option>Pain - 400 Ar</option>
                        <option>Coca Cola - 3000 Ar</option>
                        <option>Lait - 2500 Ar</option>
                        <option>Sucre - 3500 Ar</option>
                    </select>
                </div>

                <div>
                    <label>Quantité</label>
                    <input type="number" placeholder="Ex : 12">
                </div>

                <div>
                    <button class="btn-green" type="submit">Ajouter</button>
                </div>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Panier du client</h2>

        <table>
            <thead>
                <tr>
                    <th>Produit</th>
                    <th>Prix unitaire</th>
                    <th>Quantité</th>
                    <th>Montant</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Biscuit</td>
                    <td>1000 Ar</td>
                    <td>12</td>
                    <td>12000 Ar</td>
                </tr>
                <tr>
                    <td>Pain</td>
                    <td>400 Ar</td>
                    <td>2</td>
                    <td>800 Ar</td>
                </tr>
            </tbody>
        </table>

        <div class="total">
            Total : 12800 Ar
        </div>

        <div class="action">
            <button class="btn-red">Clôturer achat</button>
        </div>
    </div>

</div>

</body>
</html>
